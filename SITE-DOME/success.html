<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commande confirmée — DOME</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080808;
    color: #f0ece6;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.15em;
    margin-bottom: 2rem;
    color: #c8b89a;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    letter-spacing: 0.08em;
    margin-bottom: 1rem;
  }
  p {
    font-size: 0.95rem;
    color: #7a7570;
    line-height: 1.8;
    max-width: 420px;
    margin-bottom: 2.5rem;
  }
  a {
    display: inline-block;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #080808;
    background: #c8b89a;
    padding: 12px 28px;
    text-decoration: none;
    transition: background 0.2s;
  }
  a:hover { background: #f0ece6; }
</style>
</head>
<body>
  <div class="logo">DOME</div>
  <h1>Commande confirmée</h1>
  <p>Merci pour votre achat ! Vous recevrez un email de confirmation sous peu. Votre commande sera expédiée dans les meilleurs délais.</p>
  <a href="/">Retour au site</a>
</body>
</html>
